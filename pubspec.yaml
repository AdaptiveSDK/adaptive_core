name: adaptive_core
description: >-
  Flutter plugin for the Adaptive SDK Core module. Provides SDK initialization,
  user session management, and a resilient HTTP client with offline queue for
  the Adaptive e-learning platform.
version: 1.0.7
homepage: https://github.com/AdaptiveSDK/adaptive_core
repository: https://github.com/AdaptiveSDK/adaptive_core
issue_tracker: https://github.com/AdaptiveSDK/adaptive_core/issues

topics:
  - adaptive
  - sdk
  - e-learning
  - lms

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.adaptive.core
        pluginClass: AdaptiveCoreFlutterPlugin
      ios:
        pluginClass: AdaptiveCoreFlutterPlugin
