name: adaptive_core_flutter
description: >-
  Flutter plugin for the Adaptive SDK Core module. Provides SDK initialization,
  user session management, and a resilient HTTP client with offline queue for
  the Adaptive e-learning platform.
version: 1.0.0
homepage: https://github.com/adaptivesdk/adaptive_core_flutter
repository: https://github.com/adaptivesdk/adaptive_core_flutter
issue_tracker: https://github.com/adaptivesdk/adaptive_core_flutter/issues

topics:
  - adaptive
  - sdk
  - e-learning
  - lms

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.adaptive.core_flutter
        pluginClass: AdaptiveCoreFlutterPlugin
